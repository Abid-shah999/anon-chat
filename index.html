<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Anonymous 1:1 Chat</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; max-width: 720px; margin: 24px auto; padding: 0 12px; }
    #log { border: 1px solid #ddd; border-radius: 8px; height: 360px; overflow-y: auto; padding: 10px; background: #fafafa; }
    .sys { color: #666; font-style: italic; }
    .msg { margin: 6px 0; }
    .me { color: #0b5; }
    .them { color: #06c; }
    #controls { display: flex; gap: 8px; margin-top: 10px; }
    input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 10px 14px; border: 0; background: #0a84ff; color: white; border-radius: 6px; cursor: pointer; }
    button.secondary { background: #666; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Anonymous 1:1 Chat</h1>
  <p>“Start” চাপলে আপনাকে কারও সাথে গোপনে pair করা হবে।</p>

  <div id="log"></div>

  <div id="controls">
    <input id="text" placeholder="মেসেজ লিখুন…" />
    <button id="send">Send</button>
    <button id="start" class="secondary">Start</button>
    <button id="leave" class="secondary">Leave</button>
  </div>

  <!-- ✅ Socket.IO client (CDN) — এই লাইনটি অবশ্যই এমনই থাকতে হবে -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <script>
    // একই সার্ভার (http://localhost:4000) থেকে এই ফাইল সার্ভ হচ্ছে,
    // তাই origin আলাদা করে দেওয়ার দরকার নেই।
    const socket = io({ transports: ['websocket'] });

    const log = document.getElementById('log');
    const text = document.getElementById('text');
    const sendBtn = document.getElementById('send');
    const startBtn = document.getElementById('start');
    const leaveBtn = document.getElementById('leave');

    let paired = false;

    function addLine(html, cls='') {
      const div = document.createElement('div');
      div.className = cls ? `msg ${cls}` : 'msg';
      div.innerHTML = html;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    // --- Socket.IO ইভেন্ট হ্যান্ডলার ---
    socket.on('connect', () => addLine('<b>Connected.</b>', 'sys'));
    socket.on('disconnect', () => addLine('<b>Disconnected.</b>', 'sys'));

    socket.on('waiting', (m) => { addLine(m, 'sys'); paired = false; });
    socket.on('paired', (info) => {
      addLine(`Paired in room: <b>${info.roomId}</b>`, 'sys');
      addLine(`Partner joined. Say hi!`, 'sys');
      paired = true;
    });
    socket.on('message', (m) => addLine(`<b>Partner:</b> ${m.text}`, 'them'));
    socket.on('ended', (m) => { addLine(m, 'sys'); paired = false; });
    socket.on('error', (m) => addLine(`<b>Error:</b> ${m}`, 'sys'));

    // --- UI actions ---
    sendBtn.onclick = () => {
      if (!paired) { addLine('Not paired yet.', 'sys'); return; }
      const t = text.value.trim();
      if (!t) return;
      addLine(`<b>You:</b> ${t}`, 'me');
      socket.emit('message', t);
      text.value = '';
      text.focus();
    };

    startBtn.onclick = () => socket.emit('start');
    leaveBtn.onclick = () => socket.emit('leave');

    text.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendBtn.click();
    });
  </script>
</body>
</html>
